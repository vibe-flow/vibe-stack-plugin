# Template standalone — replace {ORG}, {REPO}, {PROJECT}, {POSTGRES_PASSWORD}, {REDIS_PASSWORD}
# Includes PostgreSQL, Redis, Caddy — fully self-contained, no external dependencies
services:
  caddy:
    image: caddy:2-alpine
    container_name: {PROJECT}-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      web:
        condition: service_healthy
    networks:
      - app

  api:
    image: ghcr.io/{ORG}/{REPO}-api:latest
    container_name: {PROJECT}-api
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    env_file: .env.prod
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - app

  web:
    image: ghcr.io/{ORG}/{REPO}-web:latest
    container_name: {PROJECT}-web
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - app

  postgres:
    image: pgvector/pgvector:pg16
    container_name: {PROJECT}-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: {PROJECT}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app

  redis:
    image: redis:7-alpine
    container_name: {PROJECT}-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app

networks:
  app:

volumes:
  uploads_data:
  caddy_data:
  caddy_config:
  postgres_data:
  redis_data:
