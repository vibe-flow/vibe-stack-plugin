# Template standalone — replace {RUNNER_LABEL}, {PROJECT_DIR}, {COMPOSE_FILE}, {ENV_FILE}, {HEALTH_URL}
# Self-contained workflow, no dependency on server-infra
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      sha_tag: ${{ steps.vars.outputs.sha_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set variables
        id: vars
        run: |
          echo "sha_tag=sha-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          REPO_NAME=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "repo_name=${REPO_NAME}" >> $GITHUB_OUTPUT

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push API
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ steps.vars.outputs.repo_name }}-api:latest
            ghcr.io/${{ steps.vars.outputs.repo_name }}-api:${{ steps.vars.outputs.sha_tag }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,scope=api,mode=max

      - name: Read .env.build
        id: env-build
        run: |
          if [ -f .env.build ]; then
            ARGS=$(grep -v '^#' .env.build | grep '=' | tr '\n' '\n')
            echo "build_args<<EOF" >> $GITHUB_OUTPUT
            echo "$ARGS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          fi

      - name: Build & Push Web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.web
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ steps.vars.outputs.repo_name }}-web:latest
            ghcr.io/${{ steps.vars.outputs.repo_name }}-web:${{ steps.vars.outputs.sha_tag }}
          build-args: ${{ steps.env-build.outputs.build_args }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,scope=web,mode=max

  deploy:
    name: Deploy to Server
    needs: build-push
    runs-on: [{RUNNER_LABEL}]
    env:
      PROJECT_DIR: {PROJECT_DIR}
    steps:
      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Sync project repo
        run: |
          REPO_URL="https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          if [ -d "$PROJECT_DIR/.git" ]; then
            cd "$PROJECT_DIR"
            git remote set-url origin "$REPO_URL"
            git fetch origin main --depth=1
            git reset --hard origin/main
          elif [ -d "$PROJECT_DIR" ]; then
            cd "$PROJECT_DIR"
            git init
            git remote add origin "$REPO_URL"
            git fetch origin main --depth=1
            git checkout -f origin/main
          else
            mkdir -p "$(dirname "$PROJECT_DIR")"
            git clone --depth=1 "$REPO_URL" "$PROJECT_DIR"
          fi

      - name: Pull new images
        working-directory: ${{ env.PROJECT_DIR }}
        run: docker compose -f {COMPOSE_FILE} --env-file {ENV_FILE} pull

      - name: Start database services
        working-directory: ${{ env.PROJECT_DIR }}
        run: docker compose -f {COMPOSE_FILE} --env-file {ENV_FILE} up -d postgres redis

      - name: Wait for database
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          for i in $(seq 1 30); do
            if docker compose -f {COMPOSE_FILE} exec -T postgres pg_isready -U postgres 2>/dev/null; then
              echo "PostgreSQL ready on attempt $i"
              exit 0
            fi
            echo "Waiting for PostgreSQL... ($i/30)"
            sleep 2
          done
          echo "PostgreSQL not ready"
          exit 1

      - name: Run migrations
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          # Mark any previously failed migrations as rolled back (fixes P3009)
          docker compose -f {COMPOSE_FILE} --env-file {ENV_FILE} exec -T postgres \
            psql -U postgres -d {PROJECT} -t -A \
            -c "SELECT migration_name FROM _prisma_migrations WHERE rolled_back_at IS NULL AND finished_at IS NULL" 2>/dev/null \
            | while read -r name; do
                [ -n "$name" ] && echo "Resolving failed migration: $name" && \
                docker compose -f {COMPOSE_FILE} --env-file {ENV_FILE} exec -T postgres \
                  psql -U postgres -d {PROJECT} -c "DELETE FROM _prisma_migrations WHERE migration_name = '$name'"
              done || true
          # Run migrations
          docker compose -f {COMPOSE_FILE} --env-file {ENV_FILE} run --rm api \
            node node_modules/prisma/build/index.js migrate deploy --schema ./prisma/schema.prisma

      - name: Deploy all services
        working-directory: ${{ env.PROJECT_DIR }}
        run: docker compose -f {COMPOSE_FILE} --env-file {ENV_FILE} up -d

      - name: Wait for health check
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          for i in $(seq 1 24); do
            API_CONTAINER=$(docker compose -f {COMPOSE_FILE} ps -q api 2>/dev/null | head -1)
            if [ -n "$API_CONTAINER" ]; then
              if docker exec "$API_CONTAINER" wget -qO- "http://localhost:3000{HEALTH_URL}" 2>/dev/null; then
                echo "Health check passed on attempt $i"
                exit 0
              fi
            fi
            echo "Attempt $i/24, waiting 5s..."
            sleep 5
          done
          echo "Health check failed"
          docker compose -f {COMPOSE_FILE} logs --tail=50 api
          exit 1

      - name: Cleanup old images
        run: docker image prune -f
