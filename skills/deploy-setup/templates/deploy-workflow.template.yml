# Template — replace {ORG}, {RUNNER_LABEL}, {PROJECT_DIR}, {HEALTH_URL}
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    uses: {ORG}/server-infra/.github/workflows/deploy-registry.yml@main
    with:
      runner_label: {RUNNER_LABEL}
      project_dir: {PROJECT_DIR}
      health_url: {HEALTH_URL}
    secrets: inherit
