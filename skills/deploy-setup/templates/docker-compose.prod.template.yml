# Template — replace {ORG}, {REPO}, {PROJECT}
services:
  api:
    image: ghcr.io/{ORG}/{REPO}-api:latest
    container_name: {PROJECT}-api
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M
    env_file: .env.prod
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - server-infra

  web:
    image: ghcr.io/{ORG}/{REPO}-web:latest
    container_name: {PROJECT}-web
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - server-infra

networks:
  server-infra:
    external: true

volumes:
  uploads_data:
